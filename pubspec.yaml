name: hazor_shield
description: Hazor Shield SDK for Flutter — bot defense for mobile apps. Verify users with proof-of-work, device attestation (Play Integrity / DeviceCheck), and behavioral signals.
version: 1.0.0
homepage: https://hazor.io
repository: https://github.com/hazorio/hazor-shield-flutter
issue_tracker: https://github.com/hazorio/hazor-shield-flutter/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0
  http: ^1.2.0
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.0
  build_runner: ^2.4.0

flutter:
  plugin:
    platforms:
      android:
        package: io.hazor.shield
        pluginClass: HazorShieldPlugin
      ios:
        pluginClass: HazorShieldPlugin
