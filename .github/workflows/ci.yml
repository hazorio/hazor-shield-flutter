name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: dart pub publish --dry-run
        continue-on-error: true
